# --------------------------------------------------
#  BASIC SITE INFO
# --------------------------------------------------
title: Sicheng Tian   # Main site title (appears in browser tab & RSS)
tagline: Welcome to Sicheng Tian's personal website. Powered by Jekyll, based on the Minimal Mistakes theme.  # Optional short tagline, used by some layouts
description: # Add your personal description here  # Strongly recommended for SEO & social cards

# TIP ── For local development you can comment out `url`
# and build with relative paths. In production you want this set.
url: # https://yourusername.github.io or your custom domain

# --------------------------------------------------
#  AUTHOR / PROFILE DATA
# --------------------------------------------------
owner:
  name: Sicheng Tian
  avatar: # your-photo.jpg (put your photo in images/ folder)
  bio: # Add your personal bio here (optional)
  email: # your-email@example.com
  cv: # https://yourusername.github.io/file/CV-SichengTian.pdf (upload your CV to file/ folder)


  # Social networking links are used in author-bio sidebar. Update and remove as you like.
  # Format examples:
  # twitter: yourusername (just the username, not full URL)
  # github: yourusername
  # linkedin: yourusername (the part after linkedin.com/in/)
  # scholar: https://scholar.google.com/citations?user=yourID (full URL)
  # researchgate: https://www.researchgate.net/profile/YourName (full URL)
  # zhihu: https://www.zhihu.com/people/yourusername (full URL)
  # xiaohongshu: yourID (just the ID number)
  # bilibili: yourID (just the ID number)
  # facebook: yourusername
  # instagram: yourusername
  # lastfm: yourusername
  # tumblr: yourusername


# --------------------------------------------------
#  SEARCH-ENGINE VERIFICATION & ANALYTICS
# --------------------------------------------------
# google_verify: "your-google-verification-code"
# bing_verify: ""    # https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
# google_analytics: "G-XXXXXXX"                                 # GA-4 property ID


# --------------------------------------------------
#  TOP NAVIGATION BAR
#  `external: true` opens the link in a new tab.
# --------------------------------------------------
links:
  - title: About Me
    url: /
  - title: Research
    url: /research/
  - title: Courses
    url: /courses/
  - title: Blogs
    url: /blogs/
  - title: Hobbies
    url: /hobbies/


# --------------------------------------------------
#  BUILD & RENDERING OPTIONS
# --------------------------------------------------
timezone: Asia/Shanghai          # IANA time-zone ID (China/Beijing is invalid)
future: true                     # Render posts dated in the future
highlighter: rouge               # Code highlighter; Rouge is default in MM
# markdown: kramdown             # Jekyll default; uncomment to force
# pygments: true                 # Legacy option (Rouge supersedes this)


# --------------------------------------------------
#  PERMALINK STRUCTURE
# --------------------------------------------------
permalink: /:categories/:title    # e.g. /tech/my-post/


# --------------------------------------------------
#  KRAMDOWN (Markdown engine) SETTINGS
# --------------------------------------------------
kramdown:
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  enable_coderay: false

  # coderay:
  #   coderay_line_numbers:
  #   coderay_line_numbers_start: 1
  #   coderay_tab_width: 4
  #   coderay_bold_every: 10
  #   coderay_css: class


# --------------------------------------------------
#  DISQUS COMMENT SYSTEM
# --------------------------------------------------
disqus:
  shortname: your-disqus-shortname


# include: [".htaccess"]
# exclude: ["lib", "config.rb", "Capfile", "config", "log", "Rakefile", "Rakefile.rb", "tmp", "less", "minimal-mistakes.sublime-project", "minimal-mistakes.sublime-workspace"]

# --------------------------------------------------
#  INCLUDE / EXCLUDE Lists
# --------------------------------------------------
include: [".htaccess"]           # Files to force-include in the build
exclude:                         # Folders/files ignored during build
  - "lib"
  - "config.rb"
  - "Capfile"
  - "config"
  - "log"
  - "Rakefile"
  - "Rakefile.rb"
  - "tmp"
  - "less"
  - "minimal-mistakes.sublime-project"
  - "minimal-mistakes.sublime-workspace"


# --------------------------------------------------
#  OPTIONAL PLUG-INS (uncomment once gems are added)
# --------------------------------------------------
plugins:
  - jekyll-feed          # Auto-generate RSS feed
  - jekyll-sitemap       # Auto-generate sitemap.xml
  - jekyll-seo-tag       # Adds SEO meta tags & JSON-LD
#   - jekyll-picture-tag   # Responsive images & WebP/AVIF
  # - jekyll-archives      # Year/month archive pages